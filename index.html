<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div class="calculator">
      <div class="calculator__screen">
        <output class="calculator__output calculator__output--secondary">7 + 7 =</output>
        <output class="calculator__output calculator__output--primary">14</output>
      </div>

      <div class="calculator__controls">
        <button class="calculator__btn calculator__btn--wide" data-action="clear">Clear</button>
        <button class="calculator__btn calculator__btn--wide" data-action="delete">Delete</button>

        <button class="calculator__btn calculator__btn--square" data-digit="7">7</button>
        <button class="calculator__btn calculator__btn--square" data-digit="8">8</button>
        <button class="calculator__btn calculator__btn--square" data-digit="9">9</button>
        <button class="calculator__btn calculator__btn--square" data-action="divide">÷</button>

        <button class="calculator__btn calculator__btn--square" data-digit="4">4</button>
        <button class="calculator__btn calculator__btn--square" data-digit="5">5</button>
        <button class="calculator__btn calculator__btn--square" data-digit="6">6</button>
        <button class="calculator__btn calculator__btn--square" data-action="multiply">×</button>

        <button class="calculator__btn calculator__btn--square" data-digit="1">1</button>
        <button class="calculator__btn calculator__btn--square" data-digit="2">2</button>
        <button class="calculator__btn calculator__btn--square" data-digit="3">3</button>
        <button class="calculator__btn calculator__btn--square" data-action="subtract">−</button>

        <button class="calculator__btn calculator__btn--square" data-digit="0">0</button>
        <button class="calculator__btn calculator__btn--square" data-digit=".">.</button>
        <button class="calculator__btn calculator__btn--square" data-action="equals">=</button>
        <button class="calculator__btn calculator__btn--square" data-action="add">+</button>
      </div>
    </div>
  </body>
</html>
