<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div class="calculator">
      <div class="calculator__screen">
        <output class="calculator__output calculator__output--secondary">1</output>
        <output class="calculator__output calculator__output--main">0</output>
      </div>

      <div class="calculator__controls">
        <button class="calculator__btn calculator__btn--wide" data-action="clear">Clear</button>
        <button class="calculator__btn calculator__btn--wide" data-action="delete">Delete</button>

        <button class="calculator__btn calculator__btn--square" data-number="7">7</button>
        <button class="calculator__btn calculator__btn--square" data-number="8">8</button>
        <button class="calculator__btn calculator__btn--square" data-number="9">9</button>
        <button class="calculator__btn calculator__btn--square" data-operator="divide">÷</button>

        <button class="calculator__btn calculator__btn--square" data-number="4">4</button>
        <button class="calculator__btn calculator__btn--square" data-number="5">5</button>
        <button class="calculator__btn calculator__btn--square" data-number="6">6</button>
        <button class="calculator__btn calculator__btn--square" data-operator="multiply">×</button>

        <button class="calculator__btn calculator__btn--square" data-number="1">1</button>
        <button class="calculator__btn calculator__btn--square" data-number="2">2</button>
        <button class="calculator__btn calculator__btn--square" data-number="3">3</button>
        <button class="calculator__btn calculator__btn--square" data-operator="subtract">−</button>

        <button class="calculator__btn calculator__btn--square" data-number="0">0</button>
        <button class="calculator__btn calculator__btn--square" data-separator="decimal-point">.</button>
        <button class="calculator__btn calculator__btn--square" data-action="equals">=</button>
        <button class="calculator__btn calculator__btn--square" data-operator="add">+</button>
      </div>
    </div>
  </body>
</html>
