<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" href="/calculator-v7/favicon.ico">
    <script type="module" crossorigin src="/calculator-v7/assets/index-CM1rwRqY.js"></script>
    <link rel="stylesheet" crossorigin href="/calculator-v7/assets/index-Cdpn5dO3.css">
  </head>
  <body>
    <div class="calculator">
      <div class="calculator__screen">
        <output class="calculator__output calculator__output--secondary"></output>
        <output class="calculator__output calculator__output--primary">0</output>
      </div>

      <div class="calculator__buttons">
        <button class="calculator__btn calculator__btn--wide" data-action="clear">C</button>
        <button class="calculator__btn calculator__btn--wide" data-action="backspace">⌫</button>

        <button class="calculator__btn calculator__btn--square" data-digit="7">7</button>
        <button class="calculator__btn calculator__btn--square" data-digit="8">8</button>
        <button class="calculator__btn calculator__btn--square" data-digit="9">9</button>
        <button class="calculator__btn calculator__btn--square" data-operator="divide">÷</button>

        <button class="calculator__btn calculator__btn--square" data-digit="4">4</button>
        <button class="calculator__btn calculator__btn--square" data-digit="5">5</button>
        <button class="calculator__btn calculator__btn--square" data-digit="6">6</button>
        <button class="calculator__btn calculator__btn--square" data-operator="multiply">×</button>

        <button class="calculator__btn calculator__btn--square" data-digit="1">1</button>
        <button class="calculator__btn calculator__btn--square" data-digit="2">2</button>
        <button class="calculator__btn calculator__btn--square" data-digit="3">3</button>
        <button class="calculator__btn calculator__btn--square" data-operator="subtract">−</button>

        <button class="calculator__btn calculator__btn--square" data-digit="0">0</button>
        <button class="calculator__btn calculator__btn--square" data-decimal-point=".">.</button>
        <button class="calculator__btn calculator__btn--square" data-action="equals">=</button>
        <button class="calculator__btn calculator__btn--square" data-operator="add">+</button>
      </div>
    </div>
  </body>
</html>
